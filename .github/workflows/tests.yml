name: tests

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  pytest:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest

      - name: Run behavior-lockdown contract suites
        run: |
          set -euo pipefail
          python -m pytest -q tests/test_policy_reason_codes.py tests/test_policy_side_effect_contracts.py

      - name: Run transport parity suites
        run: |
          set -euo pipefail
          python -m pytest -q tests/test_transport_runtime.py tests/test_transport_parity.py

      - name: Run runtime hardening suites
        run: |
          set -euo pipefail
          python -m pytest -q tests/test_runtime_hardening.py

      - name: Run operator forensics contract suites
        run: |
          set -euo pipefail
          python -m pytest -q tests/test_operator_forensics_runbook.py

      - name: Run observability hardening contract suites
        run: |
          set -euo pipefail
          python -m pytest -q tests/test_observability_contracts.py

      - name: Run full test suite
        run: |
          set -euo pipefail
          python -m pytest -q
